<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แก้ไขข้อมูลประชากร</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ff69b4 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .form-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
            max-width: 500px;
            margin: 0 auto;
        }
        .form-title {
            color: #333;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
        }
        .btn-submit {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            border: none;
            color: white;
            border-radius: 25px;
            padding: 10px 30px;
            font-weight: 600;
            width: 100%;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,105,180,0.4);
            color: white;
        }
        .btn-back {
            background: #6c757d;
            border: none;
            color: white;
            border-radius: 25px;
            padding: 10px 30px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
        }
        .btn-back:hover {
            background: #5a6268;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="form-card">
            <h2 class="form-title"><i class="bi bi-pencil-square me-2"></i>แก้ไขข้อมูลประชากร</h2>
            <form method="POST" action="{% url 'edit_person' person.id %}">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="name" class="form-label"><i class="bi bi-person me-2"></i>ชื่อประชากร</label>
                    <input type="text" class="form-control" id="name" name="name" value="{{ person.name }}" required placeholder="กรอกชื่อประชากร">
                </div>
                <div class="mb-4">
                    <label for="age" class="form-label"><i class="bi bi-calendar3 me-2"></i>อายุ</label>
                    <input type="number" class="form-control" id="age" name="age" value="{{ person.age }}" required placeholder="กรอกอายุ" min="1" max="150">
                </div>
                <button type="submit" class="btn btn-submit mb-3"><i class="bi bi-check-circle me-2"></i>บันทึกการแก้ไข</button>
                <a href="{% url 'index' %}" class="btn btn-back w-100"><i class="bi bi-arrow-left me-2"></i>กลับหน้าหลัก</a>
            </form>
        </div>
    </div>
</body>
</html>
