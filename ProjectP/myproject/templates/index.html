<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #ffffff 0%, #ffffff 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .main-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 30px;
        }
        .page-title {
            color: #333;
            font-weight: 700;
            text-align: center;
            margin-bottom: 30px;
            position: relative;
        }
        .page-title::after {
            content: '';
            width: 80px;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 2px;
        }
        .table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-weight: 600;
            border: none;
            padding: 15px;
        }
        .table tbody tr:hover {
            background-color: #f8f9fa;
            transform: scale(1.01);
            transition: all 0.3s ease;
        }
        .table tbody td {
            padding: 15px;
            vertical-align: middle;
        }
        .btn-pink {
            background: linear-gradient(135deg, #ff69b4 0%, #ff1493 100%);
            border: none;
            color: white;
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-pink:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,105,180,0.4);
            color: white;
        }
        .btn-orange {
            background: linear-gradient(135deg, #ff8c00 0%, #ff7000 100%);
            border: none;
            color: white;
            border-radius: 25px;
            padding: 8px 20px;
            font-weight: 600;
            transition: all 0.3s ease;
            text-decoration: none;
        }
        .btn-orange:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(255,140,0,0.4);
            color: white;
        }
        .person-id {
            background: #667eea;
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="main-card">
            <h2 class="page-title"><i class="bi bi-people-fill me-2"></i>ข้อมูลประชากร</h2>
            <div class="mb-3">
                <a href="{% url 'add_person' %}" class="btn btn-success"><i class="bi bi-person-plus-fill me-2"></i>เพิ่มข้อมูลประชากร</a>
            </div>
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th class="text-center">รหัสประชากร</th>
                        <th>ชื่อประชากร</th>
                        <th class="text-center">อายุ</th>
                        <th class="text-center">วันที่เพิ่มข้อมูล</th>
                        <th class="text-center">แก้ไข</th>
                        <th class="text-center">ลบ</th>
                    </tr>
                </thead>
                <tbody>
                    {% for person in all_persons %}
                    <tr>
                        <td class="text-center"><span class="person-id">{{ person.id }}</span></td>
                        <td><i class="bi bi-person-circle me-2 text-primary"></i>{{ person.name }}</td>
                        <td class="text-center"><span class="badge bg-info text-dark fs-6">{{ person.age }} ปี</span></td>
                        <td class="text-center"><i class="bi bi-calendar-check me-1 text-success"></i>{{ person.created_at|date:"d/m/Y H:i" }}</td>
                        <td class="text-center"><a href="{% url 'edit_person' person.id %}" class="btn btn-pink btn-sm"><i class="bi bi-pencil-fill me-1"></i>แก้ไข</a></td>
                        <td class="text-center"><a href="{% url 'delete_person' person.id %}" class="btn btn-orange btn-sm" onclick="return confirm('ต้องการลบข้อมูลนี้หรือไม่?')"><i class="bi bi-trash-fill me-1"></i>ลบ</a></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
